<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hevasit</title>
  
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-full overflow-auto" style="background:var(--bg);">
  <div id="app" class="w-full h-full flex flex-col" style="background:var(--bg);">
    <header class="w-full px-5 pt-4 pb-3 flex items-center justify-between flex-shrink-0" style="border-bottom:1px solid rgba(255,255,255,0.05);">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="Hevasit Logo" style="width:36px;height:36px;border-radius:10px;object-fit:cover;">
        <h1 id="mainTitle" class="text-xl font-bold" style="color:var(--text);">Hevasit</h1>
      </div>
      <div class="flex gap-2 items-center">
        <select id="loadLayoutSelect" class="text-sm" style="min-width:160px; height: 38px;"> 
          <option value="">저장된 배치 불러오기</option> 
        </select> 
        <button id="saveLayoutBtn" class="btn-secondary h-[38px] gap-1.5" title="현재 배치 저장"> 
          <i data-lucide="save" style="width:15px;height:15px;"></i> 저장 
        </button> 
        <button id="deleteLayoutBtn" class="btn-danger h-[38px]" title="선택된 배치 삭제"> 
          <i data-lucide="trash-2" style="width:15px;height:15px;"></i> 
        </button>
      </div>
    </header>
    
    <div class="flex flex-1 overflow-hidden">
      <aside class="flex flex-col gap-3 p-4 flex-shrink-0" style="width:380px;border-right:1px solid rgba(255,255,255,0.05); overflow-y: auto;">
        <div class="panel">
          <div class="section-label">배치 설정</div>
          
          <div class="flex gap-2 mb-3">
            <div class="flex-1 flex items-center justify-between rounded-lg px-3 py-2" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); height: 38px;">
              <span class="text-xs" style="color:rgba(255,255,255,0.4);">행</span> 
              <input id="rowsInput" type="number" value="5" min="1" max="10" class="w-10 text-right font-medium text-white" style="background:transparent !important; border:none !important; padding:0 !important; height: auto !important; font-size: 14px; outline: none; box-shadow: none;">
            </div>
            <div class="flex-1 flex items-center justify-between rounded-lg px-3 py-2" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); height: 38px;">
              <span class="text-xs" style="color:rgba(255,255,255,0.4);">열</span> 
              <input id="colsInput" type="number" value="6" min="1" max="10" class="w-10 text-right font-medium text-white" style="background:transparent !important; border:none !important; padding:0 !important; height: auto !important; font-size: 14px; outline: none; box-shadow: none;">
            </div>
          </div>
          
          <div class="flex items-center justify-between mb-3 px-1">
            <span class="text-xs text-white/70 font-medium">짝꿍 모드</span>
            <label class="toggle-switch">
              <input type="checkbox" id="pairModeToggle" checked>
              <span class="slider"></span>
            </label>
          </div>

          <div class="flex items-center justify-between mb-3 px-1">
            <span class="text-xs text-white/70 font-medium">구역 설정</span>
            <div class="flex items-center gap-2">
              <select id="zoneCountSelect" class="text-xs" style="height: 24px !important; padding: 0 6px !important; width: 40px; display: none;">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select>
              <label class="toggle-switch">
                <input type="checkbox" id="zoneModeToggle">
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div id="brushContainer" class="mb-3" style="display: none;">
            <span class="text-xs text-white/70 font-medium px-1 mb-2 block">자리 설정 (클릭 시 적용)</span>
            <div class="flex gap-2 px-1 justify-start">
              <div class="brush-btn active brush-none" data-brush="none" title="일반 자리">일반</div>
              <div class="brush-btn brush-disabled" data-brush="disabled" title="결번 처리">❌</div>
              <div id="brushBtn-A" class="brush-btn brush-A" data-brush="A" title="A구역">A</div>
              <div id="brushBtn-B" class="brush-btn brush-B" data-brush="B" title="B구역">B</div>
              <div id="brushBtn-C" class="brush-btn brush-C" data-brush="C" title="C구역">C</div>
              <div id="brushBtn-D" class="brush-btn brush-D" data-brush="D" title="D구역">D</div>
              <div id="brushBtn-E" class="brush-btn brush-E" data-brush="E" title="E구역" style="display:none;">E</div>
              <div id="brushBtn-F" class="brush-btn brush-F" data-brush="F" title="F구역" style="display:none;">F</div>
            </div>
          </div>
        </div>

        <details class="panel group">
          <summary class="section-label flex justify-between items-center cursor-pointer m-0 p-0" style="margin-bottom:0;">
            <span>상세 설정</span>
            <i data-lucide="chevron-down" class="transition-transform duration-200 group-open:rotate-180" style="width:14px;height:14px;color:rgba(255,255,255,0.4);"></i>
          </summary>
          <div class="pt-3 flex flex-col gap-3">
            
            <div class="flex items-center justify-between px-1">
              <span class="text-xs text-white/70 font-medium">번호 채워 앉기</span>
              <label class="toggle-switch">
                <input type="checkbox" id="fillSeatsToggle" checked>
                <span class="slider"></span>
              </label>
            </div>

            <div class="flex items-center justify-between px-1">
              <span class="text-xs text-white/70 font-medium">번호 방향</span>
              <select id="numberDirectionSelect" class="text-xs" style="height: 24px !important; padding: 0 6px !important; width: 60px;">
                <option value="horizontal" selected>가로</option>
                <option value="vertical">세로</option>
              </select>
            </div>
            
            <div style="border-top: 1px solid rgba(255,255,255,0.05); margin: 4px 0;"></div>

            <details class="group/exclude">
              <summary class="flex justify-between items-center cursor-pointer px-1 py-1 rounded hover:bg-white/5">
                <span class="text-xs text-white/70 font-medium">이웃 제외 쌍</span>
                <i data-lucide="chevron-down" class="transition-transform duration-200 group-open/exclude:rotate-180" style="width:12px;height:12px;color:rgba(255,255,255,0.3);"></i>
              </summary>
              <div class="pt-2">
                <p class="text-xs mb-2" style="color:rgba(255,255,255,0.35);">옆, 앞뒤, 대각선 금지</p>
                <div class="flex gap-1 mb-2">
                  <select id="excludeA" class="flex-1 text-xs" style="height:34px; padding:0 10px !important;"></select> 
                  <span style="color:rgba(255,255,255,0.3);line-height:34px;">↔</span> 
                  <select id="excludeB" class="flex-1 text-xs" style="height:34px; padding:0 10px !important;"></select>
                </div>
                <button id="addExcludeBtn" class="btn-secondary w-full mb-2 h-[34px] gap-1.5" style="font-size:12px;"> 
                  <i data-lucide="user-x" style="width:13px;height:13px;"></i> 제외 쌍 추가
                </button>
                <div id="excludeList" class="flex flex-col gap-1 max-h-32 overflow-y-auto"></div>
              </div>
            </details>

          </div>
        </details>
        
        <div class="panel">
          <div class="section-label">학생 관리</div>
          <div class="flex gap-2 mb-3">
            <input id="studentNameInput" type="text" placeholder="이름 입력 후 Enter" class="flex-1 min-w-0"> 
            <button id="addStudentBtn" class="btn-primary flex-shrink-0" style="padding:0; width:38px; height:38px;"> 
              <i data-lucide="plus" style="width:16px;height:16px;"></i> 
            </button>
          </div>
          <div class="flex gap-2 flex-wrap">
            <button id="bulkAddBtn" class="btn-secondary flex-1 h-[34px] gap-1.5" style="font-size:12px;"> 
              <i data-lucide="list" style="width:13px;height:13px;"></i> 일괄입력
            </button> 
            <button id="clearAllBtn" class="btn-danger flex-1 h-[34px] gap-1.5" style="font-size:12px;"> 
              <i data-lucide="x" style="width:13px;height:13px;"></i> 전체삭제
            </button>
          </div>
        </div>
        
        <div class="panel flex flex-col" style="padding: 12px;">
          <div class="section-label flex items-center justify-between mb-2 flex-shrink-0">
            <span>미배치 학생 <span id="poolCount" style="color:var(--primary);">0</span></span>
          </div>
          <div id="poolAccordion" class="flex flex-col gap-2 pb-1">
             <div class="pool-section" data-zone="none">
                <div class="pool-header flex justify-between items-center">
                  <span>기본 풀 <span class="count" id="count-none">0</span></span>
                  <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                </div>
                <div id="studentPool-none" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(255,255,255,0.02);border:1.5px dashed rgba(255,255,255,0.06);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
             <div id="poolSection-A" class="pool-section zone-section hidden" data-zone="A">
                <div class="pool-header zone-header A flex justify-between items-center">
                  <span>A구역 <span class="count" id="count-A">0</span></span>
                  <div class="flex items-center gap-2">
                    <button class="move-all-to-base" data-zone="A" title="이 구역 학생들 모두 기본 풀로 이동">
                      <i data-lucide="user-minus"></i>
                    </button>
                    <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                  </div>
                </div>
                <div id="studentPool-A" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(239,68,68,0.02);border:1.5px dashed rgba(239,68,68,0.2);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
             <div id="poolSection-B" class="pool-section zone-section hidden" data-zone="B">
                <div class="pool-header zone-header B flex justify-between items-center">
                  <span>B구역 <span class="count" id="count-B">0</span></span>
                  <div class="flex items-center gap-2">
                    <button class="move-all-to-base" data-zone="B" title="이 구역 학생들 모두 기본 풀로 이동">
                      <i data-lucide="user-minus"></i>
                    </button>
                    <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                  </div>
                </div>
                <div id="studentPool-B" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(59,130,246,0.02);border:1.5px dashed rgba(59,130,246,0.2);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
             <div id="poolSection-C" class="pool-section zone-section hidden" data-zone="C">
                <div class="pool-header zone-header C flex justify-between items-center">
                  <span>C구역 <span class="count" id="count-C">0</span></span>
                  <div class="flex items-center gap-2">
                    <button class="move-all-to-base" data-zone="C" title="이 구역 학생들 모두 기본 풀로 이동">
                      <i data-lucide="user-minus"></i>
                    </button>
                    <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                  </div>
                </div>
                <div id="studentPool-C" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(16,185,129,0.02);border:1.5px dashed rgba(16,185,129,0.2);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
             <div id="poolSection-D" class="pool-section zone-section hidden" data-zone="D">
                <div class="pool-header zone-header D flex justify-between items-center">
                  <span>D구역 <span class="count" id="count-D">0</span></span>
                  <div class="flex items-center gap-2">
                    <button class="move-all-to-base" data-zone="D" title="이 구역 학생들 모두 기본 풀로 이동">
                      <i data-lucide="user-minus"></i>
                    </button>
                    <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                  </div>
                </div>
                <div id="studentPool-D" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(245,158,11,0.02);border:1.5px dashed rgba(245,158,11,0.2);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
             <div id="poolSection-E" class="pool-section zone-section hidden" data-zone="E">
                <div class="pool-header zone-header E flex justify-between items-center">
                  <span>E구역 <span class="count" id="count-E">0</span></span>
                  <div class="flex items-center gap-2">
                    <button class="move-all-to-base" data-zone="E" title="이 구역 학생들 모두 기본 풀로 이동">
                      <i data-lucide="user-minus"></i>
                    </button>
                    <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                  </div>
                </div>
                <div id="studentPool-E" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(139,92,246,0.02);border:1.5px dashed rgba(139,92,246,0.2);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
             <div id="poolSection-F" class="pool-section zone-section hidden" data-zone="F">
                <div class="pool-header zone-header F flex justify-between items-center">
                  <span>F구역 <span class="count" id="count-F">0</span></span>
                  <div class="flex items-center gap-2">
                    <button class="move-all-to-base" data-zone="F" title="이 구역 학생들 모두 기본 풀로 이동">
                      <i data-lucide="user-minus"></i>
                    </button>
                    <i data-lucide="chevron-up" class="chevron transition-transform" style="width:14px;height:14px;"></i>
                  </div>
                </div>
                <div id="studentPool-F" class="pool-area flex flex-wrap gap-1 content-start p-2 rounded-lg" style="background:rgba(236,72,153,0.02);border:1.5px dashed rgba(236,72,153,0.2);min-height:60px;max-height:160px;overflow-y:auto;"></div>
             </div>
          </div>
        </div>
      </aside>
      
      <main class="flex-1 flex flex-col items-center justify-center overflow-auto p-4">
        <div class="seat-grid-wrapper">
          <div id="seatGrid" class="flex flex-col"></div>
          <div class="blackboard">교탁</div>
        </div>
      </main>
      
      <aside class="flex flex-col gap-3 p-4 overflow-y-auto flex-shrink-0" style="width:260px;border-left:1px solid rgba(255,255,255,0.05);">
        <div class="panel">
          <div class="section-label">자리 배치</div>
          <button id="shuffleBtn" class="btn-primary w-full mb-2 h-[38px] gap-1.5"> 
            <i data-lucide="shuffle" style="width:15px;height:15px;"></i> 자리 섞기
          </button> 
          <button id="resetSeatsBtn" class="btn-secondary w-full mb-2 h-[38px] gap-1.5" style="background: rgba(239, 68, 68, 0.08); color: #f87171; border-color: rgba(239, 68, 68, 0.25);"> 
            <i data-lucide="rotate-ccw" style="width:15px;height:15px;"></i> 자리 초기화
          </button>
          <button id="excelExportBtn" class="btn-secondary w-full h-[38px] gap-1.5" style="background: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(16, 185, 129, 0.2);"> 
            <i data-lucide="download" style="width:15px;height:15px;"></i> 엑셀로 저장 (CSV)
          </button>
        </div>
        
      </aside>
    </div>
  </div>
  
  <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col-reverse gap-2 z-[9999] items-center pointer-events-none"></div>
  
  <!-- Reset Seats Modal -->
  <div id="resetSeatsModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3 class="text-base font-bold mb-3" style="color:var(--text);">자리 초기화</h3>
      <p class="text-xs mb-4" style="color:rgba(255,255,255,0.5);">어떤 항목을 초기화하시겠습니까?</p>
      <div class="flex flex-col gap-2">
        <button id="resetSeatsOnlyBtn" class="btn-secondary h-[38px] gap-1.5" style="background:rgba(99,102,241,0.15);color:#818cf8;border-color:rgba(99,102,241,0.4);">
          <i data-lucide="users" style="width:14px;height:14px;"></i> 모든 학생 풀로 내리기
        </button>
        <button id="resetZonesBtn" class="btn-secondary h-[38px] gap-1.5" style="background:rgba(245,158,11,0.1);color:#f59e0b;border-color:rgba(245,158,11,0.3);">
          <i data-lucide="grid" style="width:14px;height:14px;"></i> 자리 구역 설정 초기화
        </button>
        <button id="resetBothBtn" class="btn-danger h-[38px] gap-1.5">
          <i data-lucide="trash-2" style="width:14px;height:14px;"></i> 모두 초기화 (학생 + 구역)
        </button>
        <button id="resetSeatsModalCancelBtn" class="btn-secondary h-[38px]">취소</button>
      </div>
    </div>
  </div>
  
  <div id="bulkModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3 class="text-lg font-bold mb-1" style="color:var(--text);">일괄 학생 입력</h3>
      <p class="text-xs mb-3" style="color:rgba(255,255,255,0.4);">한 줄에 한 명씩 이름을 입력하세요</p>
      <textarea id="bulkTextarea" rows="8" class="w-full mb-3" placeholder="홍길동&#10;김철수&#10;이영희" style="padding:14px !important; height:auto !important;"></textarea>
      
      <div class="flex items-center justify-between mb-4 px-1">
        <span class="text-xs text-white/70 font-medium">이름 앞에 번호 자동 추가</span>
        <label class="toggle-switch">
          <input type="checkbox" id="bulkNumberToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="flex gap-2 justify-end">
        <button id="bulkCancelBtn" class="btn-secondary">취소</button> 
        <button id="bulkConfirmBtn" class="btn-primary">추가</button>
      </div>
    </div>
  </div>
  
  <div id="confirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-box text-center">
      <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
      <p id="confirmMsg" class="text-sm mb-4" style="color:var(--text);"></p>
      <div class="flex gap-2 justify-center">
        <button id="confirmNo" class="btn-secondary">취소</button> 
        <button id="confirmYes" class="btn-danger">확인</button>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
